name: Manual Banking Governance Checks

on:
  workflow_dispatch:
    inputs:
      dotnet_version:
        description: ".NET SDK version for target repositories with .NET code"
        required: false
        default: "8.0.x"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  detect:
    name: Detect Project Shape
    runs-on: ubuntu-latest
    outputs:
      has_dotnet: ${{ steps.detect.outputs.has_dotnet }}
      has_copilot_package: ${{ steps.detect.outputs.has_copilot_package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Detect files
        id: detect
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $hasDotnet = [bool](Get-ChildItem -Recurse -File -Include *.sln,*.csproj | Where-Object { $_.FullName -notmatch "[\\/](bin|obj)[\\/]" } | Select-Object -First 1)
          $hasCopilotPackage = Test-Path ".github/copilot-instructions.md"
          "has_dotnet=$($hasDotnet.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "has_copilot_package=$($hasCopilotPackage.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

  build-test-lint:
    name: Build, Test, Lint
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup .NET
        if: needs.detect.outputs.has_dotnet == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Validate Copilot package
        if: needs.detect.outputs.has_copilot_package == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $requiredFiles = @(
            ".github/copilot-instructions.md",
            ".github/copilot/workflow-playbook.md",
            ".github/copilot/banking-grade-engineering.md",
            ".github/copilot/codebase-analysis-playbook.md",
            ".github/copilot/azure-devops-mcp-playbook.md",
            ".github/copilot/internal-knowledge-playbook.md",
            ".github/copilot/deep-research-playbook.md",
            ".github/docs/project-docs-base.md",
            ".github/docs/project-changelog.md",
            ".github/docs/feature-delivery-log.md"
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              throw "Missing required Copilot package file: $file"
            }
          }

          foreach ($skill in Get-ChildItem ".github/skills" -Directory) {
            $skillFile = Join-Path $skill.FullName "SKILL.md"
            if (-not (Test-Path $skillFile)) {
              throw "Missing SKILL.md in $($skill.FullName)"
            }
          }

          $frontmatterFiles = Get-ChildItem ".github" -Recurse -File -Include *.instructions.md,*.prompt.md,*.agent.md,SKILL.md
          foreach ($file in $frontmatterFiles) {
            $firstLine = Get-Content $file.FullName -TotalCount 1
            if ($firstLine -ne "---") {
              throw "Missing YAML frontmatter in $($file.FullName)"
            }
          }

      - name: Restore, build, test, and lint .NET code
        if: needs.detect.outputs.has_dotnet == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $solution = Get-ChildItem -Recurse -File -Filter *.sln | Sort-Object FullName | Select-Object -First 1
          $projects = @(Get-ChildItem -Recurse -File -Filter *.csproj | Where-Object { $_.FullName -notmatch "[\\/](bin|obj)[\\/]" } | Sort-Object FullName)

          if ($solution) {
            $target = $solution.FullName
          } elseif ($projects.Count -gt 0) {
            $target = $projects[0].FullName
          } else {
            throw "No .NET solution or project found."
          }

          dotnet restore "$target"
          dotnet build "$target" --configuration Release --no-restore
          dotnet format "$target" --verify-no-changes --no-restore

          $testProjects = @($projects | Where-Object { $_.FullName -match "(?i)(test|tests)" })
          if ($testProjects.Count -eq 0) {
            Write-Host "No .NET test projects detected."
          } else {
            foreach ($testProject in $testProjects) {
              dotnet test "$($testProject.FullName)" --configuration Release --no-build
            }
          }

      - name: No application code detected
        if: needs.detect.outputs.has_dotnet != 'true'
        run: echo "No .NET application code detected. Package-only checks were used."

  secret-scan:
    name: Secret Pattern Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Scan for likely secrets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $patterns = @(
            "-----BEGIN (RSA|DSA|EC|OPENSSH|PRIVATE) KEY-----",
            "gh[pousr]_[A-Za-z0-9_]{30,}",
            "AKIA[0-9A-Z]{16}",
            "(?i)(password|passwd|pwd|secret|token|api[_-]?key|client[_-]?secret)\s*[:=]\s*[""'][^""'\s]{12,}[""']"
          )

          $files = Get-ChildItem -Recurse -File -Force |
            Where-Object {
              $_.FullName -notmatch "[\\/]\.git[\\/]" -and
              $_.FullName -notmatch "[\\/](bin|obj|node_modules|dist|coverage)[\\/]"
            }

          $findings = foreach ($pattern in $patterns) {
            $files | Select-String -Pattern $pattern -ErrorAction SilentlyContinue
          }

          if ($findings) {
            $findings | ForEach-Object { Write-Error "$($_.Path):$($_.LineNumber): potential secret pattern" }
            throw "Potential secrets found. Review and remove or explicitly document false positives."
          }

          Write-Host "No likely secret patterns found."

  dependency-audit:
    name: Dependency Audit
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup .NET
        if: needs.detect.outputs.has_dotnet == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Audit .NET dependencies
        if: needs.detect.outputs.has_dotnet == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $solution = Get-ChildItem -Recurse -File -Filter *.sln | Sort-Object FullName | Select-Object -First 1
          $projects = @(Get-ChildItem -Recurse -File -Filter *.csproj | Where-Object { $_.FullName -notmatch "[\\/](bin|obj)[\\/]" } | Sort-Object FullName)

          if ($solution) {
            dotnet restore "$($solution.FullName)"
            dotnet list "$($solution.FullName)" package --vulnerable --include-transitive
          } elseif ($projects.Count -gt 0) {
            foreach ($project in $projects) {
              dotnet restore "$($project.FullName)"
              dotnet list "$($project.FullName)" package --vulnerable --include-transitive
            }
          } else {
            throw "No .NET project found for dependency audit."
          }

      - name: No dependency manifests detected
        if: needs.detect.outputs.has_dotnet != 'true'
        run: echo "No .NET dependency manifests detected. Dependency audit is not applicable for this package-only repository."

  codeql-sast:
    name: CodeQL SAST
    needs: detect
    if: needs.detect.outputs.has_dotnet == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  codeql-not-applicable:
    name: CodeQL Not Applicable
    needs: detect
    if: needs.detect.outputs.has_dotnet != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip
        run: echo "No .NET source files detected. CodeQL SAST is skipped for this package-only repository."
